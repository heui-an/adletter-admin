name: Windows EXE 빌드

on:
  push:
    branches: [main]
    paths:
      - 'server.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install paramiko pyinstaller

      - name: config.py 생성
        shell: bash
        run: |
          cat > config.py << 'EOF'
          SFTP_HOST     = "${{ secrets.SFTP_HOST }}"
          SFTP_USER     = "${{ secrets.SFTP_USER }}"
          SFTP_PASSWORD = "${{ secrets.SFTP_PASSWORD }}"
          SFTP_DIR      = "${{ secrets.SFTP_DIR }}"
          PUBLIC_URL    = "${{ secrets.PUBLIC_URL }}"
          EOF

      - name: EXE 빌드
        run: pyinstaller --onefile --name server server.py

      - name: 릴리즈 생성/업데이트
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 서버 최신 빌드
          files: dist/server.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
