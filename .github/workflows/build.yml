name: Windows EXE 빌드

on:
  push:
    branches: [main]
    paths:
      - 'server.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install paramiko pyinstaller

      - name: config.py 생성
        shell: bash
        run: |
          printf 'SFTP_HOST     = "%s"\nSFTP_USER     = "%s"\nSFTP_PASSWORD = "%s"\nSFTP_DIR      = "%s"\nPUBLIC_URL    = "%s"\n' \
            "${{ secrets.SFTP_HOST }}" \
            "${{ secrets.SFTP_USER }}" \
            "${{ secrets.SFTP_PASSWORD }}" \
            "${{ secrets.SFTP_DIR }}" \
            "${{ secrets.PUBLIC_URL }}" > config.py

      - name: EXE 빌드
        run: pyinstaller --onefile --name server server.py

      - name: 릴리즈 생성/업데이트
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1
          name: 서버 최신 빌드
          files: dist/server.exe
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
